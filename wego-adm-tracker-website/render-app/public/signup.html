<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Access · ADM Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {--accent:#7DBC2A;--accent2:#5a9420;--bg:#f6faf0;--surface:#fff;--text:#1f2a17;--muted:#6b7a6b;--border:rgba(0,0,0,0.08);--danger:#ef4444}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);
    background-image:radial-gradient(circle at 20% 0%,rgba(125,188,42,.18) 0%,transparent 40%),radial-gradient(circle at 100% 100%,rgba(125,188,42,.12) 0%,transparent 50%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:480px;
    box-shadow:0 12px 40px rgba(125,188,42,.10),0 2px 8px rgba(0,0,0,.04)}
  .mascot-wrap{display:flex;justify-content:center;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
  .wego-badge{background:var(--accent);color:#fff;padding:6px 14px;border-radius:8px;font-weight:700;letter-spacing:-.04em;font-size:18px}
  .brand-sub{color:var(--muted);font-size:13px;font-weight:500}
  h1{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.02em;text-align:center}
  .lede{color:var(--muted);font-size:13px;margin-bottom:24px;text-align:center;line-height:1.5}
  .field{margin-bottom:14px}
  label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  input,textarea{width:100%;background:#fafdf6;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:all .15s}
  input:focus,textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(125,188,42,.15)}
  textarea{resize:vertical;min-height:72px}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:6px;box-shadow:0 4px 12px rgba(125,188,42,.30)}
  .btn:hover{background:var(--accent2);transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .switch{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
  .switch a{color:var(--accent2);text-decoration:none;font-weight:600}
  .err{background:#fee;border:1px solid #fcc;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:14px;display:none}
  .ok-screen{display:none;text-align:center}
  .ok-icon{width:64px;height:64px;border-radius:50%;background:#eef6e1;color:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;font-weight:700}

  /* ── Animated Wego visuals ── */
  body{position:relative;overflow-x:hidden}
  .wego-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:linear-gradient(135deg,#f6faf0 0%,#e8f5d4 50%,#f0f8db 100%)}
  .wego-bg::before,.wego-bg::after{content:"";position:absolute;border-radius:50%;
    filter:blur(60px);opacity:.55;animation:blob-drift 22s ease-in-out infinite}
  .wego-bg::before{width:460px;height:460px;
    background:radial-gradient(circle,#A8DC4F 0%,transparent 70%);top:-100px;left:-120px}
  .wego-bg::after{width:520px;height:520px;
    background:radial-gradient(circle,#7DBC2A 0%,transparent 70%);
    bottom:-150px;right:-150px;animation-delay:-11s}
  .wego-bg .blob3{position:absolute;width:320px;height:320px;
    background:radial-gradient(circle,#C8F08A 0%,transparent 70%);
    border-radius:50%;filter:blur(50px);opacity:.45;top:50%;left:50%;
    animation:blob-drift 18s ease-in-out infinite -7s}
  @keyframes blob-drift{0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(60px,-40px) scale(1.15)}
    66%{transform:translate(-50px,30px) scale(.9)}}
  .wego-bg .float-dot{position:absolute;width:8px;height:8px;
    background:rgba(125,188,42,.35);border-radius:50%;animation:float-up 14s linear infinite}
  @keyframes float-up{from{transform:translateY(110vh) translateX(0);opacity:0}
    10%{opacity:1}90%{opacity:1}to{transform:translateY(-15vh) translateX(40px);opacity:0}}
  .mascot-3d{width:120px;height:120px;margin:0 auto 12px;display:block;
    filter:drop-shadow(0 12px 28px rgba(125,188,42,.30));perspective:600px}
  .wego-mascot-svg{width:100%;height:100%;display:block;overflow:visible;
    transform-origin:50% 90%;animation:wego-float 4s ease-in-out infinite}
  .wego-mascot-svg .mascot-body{transform-origin:50% 88%;animation:wego-breathe 2.6s ease-in-out infinite}
  .wego-mascot-svg .mascot-shadow{transform-origin:50% 92%;animation:wego-shadow-scale 4s ease-in-out infinite}
  .wego-mascot-svg .fuzz-back circle{transform-origin:center;animation:wego-fuzz 3s ease-in-out infinite}
  .wego-mascot-svg .fuzz-back circle:nth-child(2n){animation-delay:-.5s}
  .wego-mascot-svg .fuzz-back circle:nth-child(3n){animation-delay:-1.2s}
  .wego-mascot-svg .pupil{transform-origin:center;animation:wego-blink 5s ease-in-out infinite}
  .wego-mascot-svg .spark{opacity:0;animation:wego-sparkle 3s ease-in-out infinite}
  .wego-mascot-svg .spark.s1{animation-delay:0s}.wego-mascot-svg .spark.s2{animation-delay:.7s}
  .wego-mascot-svg .spark.s3{animation-delay:1.4s}.wego-mascot-svg .spark.s4{animation-delay:2.1s}
  @keyframes wego-float{0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-8px) rotate(2deg)}}
  @keyframes wego-breathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.04,.97)}}
  @keyframes wego-shadow-scale{0%,100%{transform:scaleX(1);opacity:.18}
    50%{transform:scaleX(.85);opacity:.10}}
  @keyframes wego-fuzz{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  @keyframes wego-blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  @keyframes wego-sparkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.9;transform:scale(1.4)}}
  @media (prefers-reduced-motion: reduce){
    .wego-mascot-svg,.mascot-body,.pupil,.spark,.fuzz-back circle,
    .wego-bg::before,.wego-bg::after,.wego-bg .blob3,.wego-bg .float-dot{animation:none!important}
  }
</style>
</head>
<body>
<div class="wego-bg" aria-hidden="true">
  <div class="blob3"></div>
  <span class="float-dot" style="left:10%;animation-delay:0s"></span>
  <span class="float-dot" style="left:25%;animation-delay:-3s"></span>
  <span class="float-dot" style="left:40%;animation-delay:-7s"></span>
  <span class="float-dot" style="left:60%;animation-delay:-2s"></span>
  <span class="float-dot" style="left:75%;animation-delay:-5s"></span>
  <span class="float-dot" style="left:90%;animation-delay:-9s"></span>
</div>

<div class="card">
  <div id="form-screen">
    <div class="mascot-3d">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="wego-mascot-svg">
    <defs>
      <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#C8F08A"/><stop offset="35%" stop-color="#A8DC4F"/>
        <stop offset="70%" stop-color="#7DBC2A"/><stop offset="100%" stop-color="#3d6a14"/>
      </radialGradient>
      <radialGradient id="hl" cx="35%" cy="30%" r="25%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <radialGradient id="eyeGrad" cx="40%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#fff"/><stop offset="80%" stop-color="#f0f0f0"/>
        <stop offset="100%" stop-color="#d0d0d0"/>
      </radialGradient>
      <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/><feOffset dx="0" dy="3"/>
        <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <ellipse class="mascot-shadow" cx="50" cy="92" rx="22" ry="3" fill="rgba(0,0,0,0.18)"/>
    <g class="fuzz-back" fill="#5a9420" opacity="0.85">
      <circle cx="14" cy="32" r="4"/><circle cx="86" cy="32" r="4"/>
      <circle cx="10" cy="55" r="3.5"/><circle cx="90" cy="55" r="3.5"/>
      <circle cx="22" cy="14" r="3"/><circle cx="78" cy="14" r="3"/>
      <circle cx="50" cy="6" r="3"/><circle cx="32" cy="78" r="3.2"/><circle cx="68" cy="78" r="3.2"/>
    </g>
    <g class="mascot-body" filter="url(#softShadow)">
      <ellipse cx="50" cy="52" rx="32" ry="35" fill="url(#bodyGrad)"/>
      <ellipse cx="38" cy="36" rx="18" ry="14" fill="url(#hl)"/>
      <ellipse cx="32" cy="28" rx="3" ry="2" fill="rgba(255,255,255,0.6)"/>
      <g class="mascot-eyes">
        <ellipse cx="38" cy="48" rx="6" ry="7.5" fill="url(#eyeGrad)"/>
        <ellipse cx="62" cy="48" rx="6" ry="7.5" fill="url(#eyeGrad)"/>
        <circle class="pupil" cx="39" cy="49" r="3" fill="#1a2e0b"/>
        <circle class="pupil" cx="63" cy="49" r="3" fill="#1a2e0b"/>
        <circle cx="40" cy="47.5" r="1.1" fill="#fff"/>
        <circle cx="64" cy="47.5" r="1.1" fill="#fff"/>
      </g>
      <path d="M40 64 Q50 72 60 64" stroke="#1a2e0b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M44 65 Q50 70 56 65 Q50 72 44 65 Z" fill="#a83c5e" opacity="0.7"/>
      <ellipse cx="29" cy="60" rx="4" ry="2.4" fill="#ef8f8f" opacity="0.55"/>
      <ellipse cx="71" cy="60" rx="4" ry="2.4" fill="#ef8f8f" opacity="0.55"/>
      <ellipse cx="38" cy="86" rx="6" ry="3" fill="#3d6a14"/>
      <ellipse cx="62" cy="86" rx="6" ry="3" fill="#3d6a14"/>
    </g>
    <g class="sparkles" fill="#7DBC2A">
      <circle class="spark s1" cx="15" cy="20" r="1.6"/>
      <circle class="spark s2" cx="85" cy="20" r="1.4"/>
      <circle class="spark s3" cx="90" cy="65" r="1.5"/>
      <circle class="spark s4" cx="10" cy="68" r="1.3"/>
    </g>
  </svg>
</div>

    <div class="brand"><span class="wego-badge">wego<sup style="font-size:18px;top:0">.</sup></span><span class="brand-sub">/ ADM Tracker</span></div>
    <h1>Request Access</h1>
    <p class="lede">Internal Wego team tool. Submit the form — admin reviews each request.</p>
    <div id="err" class="err"></div>
    <form onsubmit="signup(event)">
      <div class="field"><label>Full Name</label><input type="text" id="name" required autocomplete="name"></div>
      <div class="field"><label>Email</label><input type="email" id="email" required autocomplete="email"></div>
      <div class="field"><label>Password (min 8 chars)</label><input type="password" id="password" required minlength="8" autocomplete="new-password"></div>
      <div class="field"><label>Why do you need access? (optional)</label><textarea id="reason" placeholder="Team / role / use case…"></textarea></div>
      <button class="btn" id="btn" type="submit">Send Request</button>
    </form>
    <div class="switch">Already have an account? <a href="/login">Sign in</a></div>
  </div>
  <div id="ok-screen" class="ok-screen">
    <div class="ok-icon">✓</div>
    <h1 style="margin-bottom:12px">Request Sent</h1>
    <p class="lede">The administrator has been notified. You'll receive an email at <b id="ok-email"></b> once approved. Then you can sign in.</p>
    <a class="btn" href="/login" style="display:inline-block;margin-top:8px;text-align:center;text-decoration:none;width:auto;padding:13px 24px">Go to Sign In</a>
  </div>
</div>
<script>
  async function signup(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    btn.disabled = true; btn.textContent = 'Sending…'; err.style.display = 'none';
    const email = document.getElementById('email').value;
    try {
      const r = await fetch('/api/signup', {
        method: 'POST', headers: {'content-type':'application/json'},
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: email,
          password: document.getElementById('password').value,
          reason: document.getElementById('reason').value
        })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Signup failed');
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('ok-email').textContent = email;
      document.getElementById('ok-screen').style.display = 'block';
    } catch (e) {
      err.textContent = e.message; err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Request';
    }
  }
</script>
</body>
</html>
