<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · ADM Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {--accent:#7DBC2A;--accent2:#5a9420;--bg:#f6faf0;--surface:#fff;--text:#1f2a17;--muted:#6b7a6b;--border:rgba(0,0,0,0.08);--danger:#ef4444}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);
    background-image:radial-gradient(circle at 20% 0%,rgba(125,188,42,.18) 0%,transparent 40%),radial-gradient(circle at 100% 100%,rgba(125,188,42,.12) 0%,transparent 50%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;
    box-shadow:0 12px 40px rgba(125,188,42,.10),0 2px 8px rgba(0,0,0,.04)}
  .mascot-wrap{display:flex;justify-content:center;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
  .wego-badge{background:var(--accent);color:#fff;padding:6px 14px;border-radius:8px;font-weight:700;letter-spacing:-.04em;font-size:18px}
  .brand-sub{color:var(--muted);font-size:13px;font-weight:500}
  h1{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.02em;text-align:center}
  .lede{color:var(--muted);font-size:13px;margin-bottom:24px;text-align:center}
  .field{margin-bottom:14px}
  label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  input{width:100%;background:#fafdf6;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:all .15s}
  input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(125,188,42,.15)}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:6px;box-shadow:0 4px 12px rgba(125,188,42,.30)}
  .btn:hover{background:var(--accent2);transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .switch{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
  .switch a{color:var(--accent2);text-decoration:none;font-weight:600}
  .err{background:#fee;border:1px solid #fcc;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:14px;display:none}
  .info{background:#eef6e1;border:1px solid rgba(125,188,42,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--accent2);margin-bottom:14px}

  /* ── Animated Wego visuals ── */
  body{position:relative;overflow-x:hidden}
  .wego-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:linear-gradient(135deg,#f6faf0 0%,#e8f5d4 50%,#f0f8db 100%)}
  .wego-bg::before,.wego-bg::after{content:"";position:absolute;border-radius:50%;
    filter:blur(60px);opacity:.55;animation:blob-drift 22s ease-in-out infinite}
  .wego-bg::before{width:460px;height:460px;
    background:radial-gradient(circle,#A8DC4F 0%,transparent 70%);top:-100px;left:-120px}
  .wego-bg::after{width:520px;height:520px;
    background:radial-gradient(circle,#7DBC2A 0%,transparent 70%);
    bottom:-150px;right:-150px;animation-delay:-11s}
  .wego-bg .blob3{position:absolute;width:320px;height:320px;
    background:radial-gradient(circle,#C8F08A 0%,transparent 70%);
    border-radius:50%;filter:blur(50px);opacity:.45;top:50%;left:50%;
    animation:blob-drift 18s ease-in-out infinite -7s}
  @keyframes blob-drift{0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(60px,-40px) scale(1.15)}
    66%{transform:translate(-50px,30px) scale(.9)}}
  .wego-bg .float-dot{position:absolute;width:8px;height:8px;
    background:rgba(125,188,42,.35);border-radius:50%;animation:float-up 14s linear infinite}
  @keyframes float-up{from{transform:translateY(110vh) translateX(0);opacity:0}
    10%{opacity:1}90%{opacity:1}to{transform:translateY(-15vh) translateX(40px);opacity:0}}
  .mascot-3d{width:160px;height:160px;margin:0 auto 12px;display:block;
    filter:drop-shadow(0 12px 28px rgba(125,188,42,.30));perspective:600px}
  .wego-mascot-svg{width:100%;height:100%;display:block;overflow:visible;
    transform-origin:50% 90%;animation:wego-float 4s ease-in-out infinite}
  .wego-mascot-svg .mascot-body{transform-origin:50% 88%;animation:wego-breathe 2.6s ease-in-out infinite}
  .wego-mascot-svg .mascot-shadow{transform-origin:50% 92%;animation:wego-shadow-scale 4s ease-in-out infinite}
  .wego-mascot-svg .fuzz-back circle{transform-origin:center;animation:wego-fuzz 3s ease-in-out infinite}
  .wego-mascot-svg .fuzz-back circle:nth-child(2n){animation-delay:-.5s}
  .wego-mascot-svg .fuzz-back circle:nth-child(3n){animation-delay:-1.2s}
  .wego-mascot-svg .pupil{transform-origin:center;animation:wego-blink 5s ease-in-out infinite}
  .wego-mascot-svg .spark{opacity:0;animation:wego-sparkle 3s ease-in-out infinite}
  .wego-mascot-svg .spark.s1{animation-delay:0s}.wego-mascot-svg .spark.s2{animation-delay:.7s}
  .wego-mascot-svg .spark.s3{animation-delay:1.4s}.wego-mascot-svg .spark.s4{animation-delay:2.1s}
  @keyframes wego-float{0%,100%{transform:translateY(0) rotate(-2deg)}
    50%{transform:translateY(-8px) rotate(2deg)}}
  @keyframes wego-breathe{0%,100%{transform:scale(1,1)}50%{transform:scale(1.04,.97)}}
  @keyframes wego-shadow-scale{0%,100%{transform:scaleX(1);opacity:.18}
    50%{transform:scaleX(.85);opacity:.10}}
  @keyframes wego-fuzz{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  @keyframes wego-blink{0%,92%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
  @keyframes wego-sparkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.9;transform:scale(1.4)}}
  @media (prefers-reduced-motion: reduce){
    .wego-mascot-svg,.mascot-body,.pupil,.spark,.fuzz-back circle,
    .wego-bg::before,.wego-bg::after,.wego-bg .blob3,.wego-bg .float-dot{animation:none!important}
  }
</style>
</head>

  <div id="err" class="err"></div>
  <form onsubmit="login(event)">
    <div class="field"><label>Email</label><input type="email" id="email" required autofocus autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="password" required autocomplete="current-password"></div>
    <button class="btn" id="btn" type="submit">Sign In</button>
  </form>
  <div class="switch">Don't have an account? <a href="/signup">Request access</a></div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  if (params.get('status') === 'pending') {
    const m = document.getElementById('status-msg');
    m.textContent = 'Your access request is awaiting admin approval. You will receive an email once processed.';
    m.style.display = 'block';
  } else if (params.get('status') === 'rejected') {
    const m = document.getElementById('err');
    m.textContent = 'Your access request was not approved. Contact the administrator if this is a mistake.';
    m.style.display = 'block';
  }

  async function login(e) {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display = 'none';
    try {
      const r = await fetch('/api/login', {
        method: 'POST', headers: {'content-type':'application/json'},
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Sign-in failed');
      location.href = '/';
    } catch (e) {
      err.textContent = e.message; err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
