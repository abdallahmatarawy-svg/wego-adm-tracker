<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set new password · ADM Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--accent:#7DBC2A;--accent2:#5a9420;--bg:#f6faf0;--surface:#fff;--text:#1f2a17;--muted:#6b7a6b;--border:rgba(0,0,0,0.08);--danger:#ef4444;--success:#5a9420}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:linear-gradient(135deg,#f6faf0 0%,#e8f5d4 50%,#f0f8db 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(125,188,42,.10),0 2px 8px rgba(0,0,0,.04)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;justify-content:center}
.wego-badge{background:var(--accent);color:#fff;padding:6px 14px;border-radius:8px;font-weight:700;letter-spacing:-.04em;font-size:18px}
.brand-sub{color:var(--muted);font-size:13px;font-weight:500}
h1{font-size:22px;font-weight:600;margin-bottom:6px;letter-spacing:-.02em;text-align:center}
.lede{color:var(--muted);font-size:13px;margin-bottom:24px;text-align:center;line-height:1.5}
.field{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
input{width:100%;background:#fafdf6;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:all .15s}
input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(125,188,42,.15)}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:6px;box-shadow:0 4px 12px rgba(125,188,42,.30)}
.btn:hover{background:var(--accent2);transform:translateY(-1px)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.switch{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
.switch a{color:var(--accent2);text-decoration:none;font-weight:600}
.err{background:#fee;border:1px solid #fcc;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:14px;display:none}
.ok-screen{display:none;text-align:center}
.ok-icon{width:64px;height:64px;border-radius:50%;background:#eef6e1;color:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;font-weight:700}
.hint{font-size:11px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <div id="form-screen">
    <div class="brand"><span class="wego-badge">wego<sup style="font-size:18px;top:0">.</sup></span><span class="brand-sub">/ ADM Tracker</span></div>
    <h1>Set new password</h1>
    <p class="lede">Enter a new password for your account. Must be at least 8 characters.</p>
    <div id="err" class="err"></div>
    <form onsubmit="submitReset(event)">
      <div class="field"><label>New password</label><input type="password" id="p1" required minlength="8" autocomplete="new-password" autofocus></div>
      <div class="field"><label>Confirm new password</label><input type="password" id="p2" required minlength="8" autocomplete="new-password"><div class="hint">Both fields must match.</div></div>
      <button class="btn" id="btn" type="submit">Save new password</button>
    </form>
    <div class="switch"><a href="/login">Back to sign in</a></div>
  </div>
  <div id="ok-screen" class="ok-screen">
    <div class="ok-icon">✓</div>
    <h1 style="margin-bottom:12px">Password updated</h1>
    <p class="lede">Your new password has been saved. You can sign in now.</p>
    <a class="btn" href="/login" style="display:inline-block;margin-top:8px;text-align:center;text-decoration:none;width:auto;padding:13px 24px">Sign in</a>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const token = params.get('token');
if (!id || !token) {
  document.getElementById('err').textContent = 'Missing or invalid reset link. Please request a new one from the sign-in page.';
  document.getElementById('err').style.display = 'block';
  document.getElementById('btn').disabled = true;
}

async function submitReset(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const p1 = document.getElementById('p1').value;
  const p2 = document.getElementById('p2').value;
  err.style.display = 'none';
  if (p1 !== p2) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block';
    return;
  }
  if (p1.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({ id, token, password: p1 })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Reset failed');
    document.getElementById('form-screen').style.display = 'none';
    document.getElementById('ok-screen').style.display = 'block';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Save new password';
  }
}
</script>
</body>
</html>
